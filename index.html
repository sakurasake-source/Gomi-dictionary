<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f3f1ec">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Gomi Dictionary / ゴミ辞典</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗑️</text></svg>">
<style>
/* Gomi Dictionary - 移动端体验优化 v2 */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f3f1ec;--card:#fff;--primary:#3a7d4f;--primary-light:#deede2;--text:#1a1a1a;--text-secondary:#6b6b6b;--text-tertiary:#999;--border:#e2ddd4;--tag-bg:#eef2ee;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--shadow-lg:0 4px 12px rgba(0,0,0,.08);--radius:12px;--radius-sm:8px;--font:-apple-system,'Hiragino Sans','Noto Sans CJK SC','Segoe UI',sans-serif;--safe-bottom:env(safe-area-inset-bottom,0);--nav-height:56px;--overlay:rgba(0,0,0,.5);--accent-orange:#e67e22;--cat-moeru:#c0392b;--cat-moenai:#c7952b;--cat-recycle:#3a7d4f;--cat-koshi:#8d6e63;--cat-sodai:#8e44ad;--cat-not_collected:#636e72;--cat-clean_center:#d68910}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1e;--card:#252529;--primary:#4caf6a;--primary-light:#1e3328;--text:#e8e8e8;--text-secondary:#aaa;--text-tertiary:#777;--border:#3a3a3e;--tag-bg:#2a2a2e;--shadow:0 1px 3px rgba(0,0,0,.2),0 1px 2px rgba(0,0,0,.15);--shadow-lg:0 4px 12px rgba(0,0,0,.25)}}
html{font-size:16px;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;overflow-x:hidden;-webkit-font-smoothing:antialiased}
#app{max-width:520px;margin:0 auto;padding:0 0 calc(20px + var(--safe-bottom))}
header{position:sticky;top:0;z-index:50;background:var(--bg);padding:10px 14px 6px;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between}
h1{font-size:20px;font-weight:700;color:var(--primary);letter-spacing:-.3px;user-select:none}
.lang-switch{display:flex;gap:2px;background:var(--border);border-radius:6px;padding:2px}
.lang-btn{background:none;border:none;padding:5px 11px;border-radius:5px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--text-secondary);transition:all .15s;-webkit-tap-highlight-color:transparent}
.lang-btn:active{transform:scale(.95)}
.lang-btn.active{background:var(--primary);color:#fff}
.subtitle{font-size:12px;color:var(--text-tertiary);margin-top:1px;text-align:center}
.search-section{padding:8px 14px 0}
.city-selector{display:flex;gap:6px;margin-bottom:8px;font-size:13px}
.city-selector select{flex:1;padding:7px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);font-size:13px;color:var(--text);appearance:auto;cursor:pointer}
.input-group{display:flex;gap:6px;position:relative}
#search-input{flex:1;height:44px;padding:0 36px 0 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:16px;background:var(--card);color:var(--text);outline:none;transition:border .2s,box-shadow .2s}
#search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(58,125,79,.12)}
#search-input::placeholder{color:var(--text-tertiary)}
#clear-btn{position:absolute;left:calc(100% - 82px);top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;color:var(--text-tertiary);cursor:pointer;padding:4px;display:none;z-index:2;line-height:1;-webkit-tap-highlight-color:transparent}
#clear-btn:active{transform:translateY(-50%) scale(.85)}
#search-input:not(:placeholder-shown) ~ #clear-btn{display:block}
#mic-btn,#search-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:none;border-radius:var(--radius);font-size:20px;cursor:pointer;background:var(--card);border:1.5px solid var(--border);transition:all .15s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
#mic-btn:active,#search-btn:active{transform:scale(.92)}
#mic-btn:hover,#search-btn:hover{border-color:var(--primary);background:var(--primary-light)}
#mic-btn.listening{background:#fff0e0;border-color:var(--accent-orange);animation:pulse 1.4s infinite}
.quick-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;padding-bottom:4px}
.tag{padding:5px 12px;background:var(--tag-bg);border-radius:20px;font-size:12px;cursor:pointer;transition:all .12s;color:var(--text-secondary);border:1px solid transparent;user-select:none;-webkit-tap-highlight-color:transparent}
.tag:active{transform:scale(.94);background:var(--primary-light);color:var(--primary);border-color:var(--primary)}
.suggestions{position:absolute;top:100%;left:0;right:80px;z-index:40;background:var(--card);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);margin-top:2px;max-height:260px;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.suggestions.show{display:block}
.suggestion-item{padding:10px 14px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;display:flex;align-items:center;gap:8px;-webkit-tap-highlight-color:transparent}
.suggestion-item:last-child{border-bottom:none}
.suggestion-item:active,.suggestion-item.highlight{background:var(--primary-light)}
.suggestion-item .s-cat{font-size:10px;padding:1px 6px;border-radius:4px;color:#fff;font-weight:600}
.suggestion-item .s-name{flex:1}
.suggestion-item .s-ja{font-size:11px;color:var(--text-tertiary)}
.result-section{margin:6px 14px 0;animation:fadeUp .25s ease}
.result-card{border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-lg)}
.result-header{padding:14px 16px;color:#fff;display:flex;align-items:center;gap:10px}
.result-header .emoji{font-size:24px}
.result-header .cat-title{font-size:16px;font-weight:600}
.result-header .bag-name{font-size:12px;opacity:.85;margin-top:1px}
.result-body{padding:14px 16px;background:var(--card)}
.result-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0}
.result-item .label{font-size:12px;color:var(--text-secondary);min-width:56px;flex-shrink:0}
.result-item .value{font-size:14px;font-weight:500;word-break:break-word;color:var(--text)}
.result-item .value.note{font-weight:400;font-size:13px;color:var(--text-secondary);line-height:1.6}
.result-divider{border:none;border-top:1px solid var(--border);margin:6px 0}
.no-result{text-align:center;padding:30px 16px;color:var(--text-secondary);font-size:14px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow)}
.match-info{font-size:12px;color:var(--text-tertiary);margin-bottom:6px;padding:4px 0}
.help-section{padding:14px 14px 0}
.help-section h2{font-size:15px;margin-bottom:8px}
.categories-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.cat-card{border-radius:var(--radius-sm);padding:10px 12px;background:var(--card);border-left:3px solid var(--primary);box-shadow:var(--shadow);transition:transform .15s}
.cat-card:active{transform:scale(.97)}
.cat-card .cat-name{font-size:13px;font-weight:600}
.cat-card .cat-bag{font-size:11px;margin-top:2px;font-weight:500}
.cat-card .cat-desc{font-size:11px;color:var(--text-secondary);margin-top:3px;line-height:1.4}
.history-section{padding:8px 14px}
.history-header{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-tertiary);margin-bottom:4px}
.history-clear{background:none;border:none;font-size:12px;color:var(--text-tertiary);cursor:pointer;padding:2px 4px}
.history-item{display:flex;align-items:center;gap:8px;padding:8px 0;cursor:pointer;border-bottom:1px solid var(--border);font-size:14px;-webkit-tap-highlight-color:transparent}
.history-item:active{background:var(--primary-light);margin:0 -14px;padding:8px 14px;border-radius:var(--radius-sm)}
.history-item:last-child{border:none}
.history-item .h-icon{font-size:14px;color:var(--text-tertiary)}
.history-item .h-text{flex:1}
.history-item .h-del{background:none;border:none;font-size:14px;color:var(--text-tertiary);cursor:pointer;padding:2px}
.speech-status{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:24px 32px;border-radius:20px;font-size:18px;z-index:999;text-align:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 8px 32px rgba(0,0,0,.3);animation:fadeUp .2s ease}
.speech-status .hint{font-size:13px;color:#bbb;margin-top:8px}
.speech-wave{display:flex;gap:4px;justify-content:center;margin-top:12px}
.speech-wave span{width:4px;height:20px;background:#fff;border-radius:2px;animation:wave 1s ease-in-out infinite}
.speech-wave span:nth-child(2){animation-delay:.15s;height:28px}
.speech-wave span:nth-child(3){animation-delay:.3s;height:36px}
.speech-wave span:nth-child(4){animation-delay:.45s;height:28px}
.speech-wave span:nth-child(5){animation-delay:.6s;height:20px}
@keyframes wave{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}
footer{padding:16px 14px calc(8px + var(--safe-bottom));text-align:center}
footer p{font-size:11px;color:var(--text-tertiary)}
footer a{color:var(--primary);text-decoration:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(230,126,34,.35)}50%{box-shadow:0 0 0 10px rgba(230,126,34,0)}}
@media(max-width:380px){.categories-grid{grid-template-columns:1fr}.quick-tags{gap:4px}.tag{font-size:11px;padding:4px 10px}}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-top">
      <h1>Gomi Dictionary</h1>
      <div class="lang-switch">
        <button class="lang-btn active" data-lang="zh">中</button>
        <button class="lang-btn" data-lang="ja">日</button>

  <section class="search-section">

  <section id="history-section" class="history-section hidden">

  <section id="result-section" class="result-section hidden">
    <div id="result-card" class="result-card"></div>
  </section>

  <section id="help-section" class="help-section">
    <h2 id="help-title">📖 糸島市垃圾分类</h2>
    <div class="categories-grid" id="categories-grid"></div>

  <footer>

</div>

<div id="speech-status" class="speech-status hidden">

</div>

// ===== Search =====
function getCityData(cityId){return GOMI_DATA[cityId]||null}
function getCategory(cityId,catId){const cd=getCityData(cityId);return cd?cd.categories.find(c=>c.id===catId)||null:null}
function getCatColor(catId){const m={moeru:"var(--cat-moeru)",moenai:"var(--cat-moenai)",recycle:"var(--cat-recycle)",koshi:"var(--cat-koshi)",sodai:"var(--cat-sodai)",not_collected:"var(--cat-not_collected)",clean_center:"var(--cat-clean_center)"};return m[catId]||"var(--primary)"}
function kanaNorm(str){return str.toLowerCase().replace(/[\u30a1-\u30f6]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60))}
function esc(x){return String(x).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function getAllItems(cityId){const cd=getCityData(cityId);if(!cd)return[];return cd.items.map(item=>({...item,_kw:[item.name,item.zh,item.en,item.ko,...(item.alias||[])].filter(Boolean).map(x=>kanaNorm(String(x).toLowerCase()))}))}
function levenshtein(a,b){const m=a.length,n=b.length;if(m===0)return n;if(n===0)return m;const dp=Array.from({length:m+1},()=>new Uint8Array(n+1));for(let i=0;i<=m;i++)dp[i][0]=i;for(let j=0;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++){for(let j=1;j<=n;j++){const cost=a[i-1]===b[j-1]?0:1;dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+cost)}}return dp[m][n]}
function editDistanceOk(q,t,max){if(t.length<=2)return false;if(/[\u4e00-\u9fff]/.test(t)&&t.length<=3)return false;return levenshtein(q,t)<=max}
function fuzzyScore(query,keywords){if(!query||!keywords||keywords.length===0)return[false,0];const q=kanaNorm(query.trim().toLowerCase());if(!q)return[false,0];const qLen=q.length;for(const kw of keywords){if(kw===q)return[true,100]}for(const kw of keywords){if(kw.startsWith(q))return[true,90-Math.abs(kw.length-qLen)*2]}for(const kw of keywords){if(kw.includes(q))return[true,70]}for(const kw of keywords){if(q.includes(kw))return[true,50+kw.length*2]}const maxDist=qLen<=3?1:qLen<=6?2:3;for(const kw of keywords){if(editDistanceOk(q,kw,maxDist))return[true,40-levenshtein(q,kw)*5]}const parts=q.split(/[\s,，、]+/).filter(Boolean);if(parts.length>1){const matchCount=parts.filter(p=>keywords.some(k=>k.includes(p)||p.includes(k))).length;if(matchCount>=2)return[true,45+matchCount*5];if(matchCount===1&&parts.length===2)return[true,30]}const cjkChars=[...q].filter(c=>c.length===1&&/[\u4e00-\u9fff\u3040-\u309f\u30a0-\u30ff]/.test(c));if(cjkChars.length>=2){const matchCount=cjkChars.filter(char=>keywords.some(kw=>kw.includes(char))).length;const ratio=matchCount/cjkChars.length;if(ratio>=0.7&&matchCount>=2)return[true,20+matchCount*5];if(matchCount>=cjkChars.length-1&&cjkChars.length>=3)return[true,15]}return[false,0]}
function searchItems(cityId,query){if(!query||!query.trim())return[];const items=getAllItems(cityId);const q=query.trim().toLowerCase();const scored=[];for(const item of items){const[match,score]=fuzzyScore(q,item._kw);if(match)scored.push({item,score})}scored.sort((a,b)=>b.score-a.score);return scored.slice(0,10).map(s=>s.item)}
function getSuggestions(cityId,query){if(!query||query.trim().length<1)return[];const items=getAllItems(cityId);const q=query.trim().toLowerCase();const scored=[];for(const item of items){const[match,score]=fuzzyScore(q,item._kw);if(match)scored.push({item,score})}scored.sort((a,b)=>b.score-a.score);return scored.slice(0,5).map(s=>s.item)}
function renderCategories(){const cityId=document.getElementById("city-select").value;const cd=getCityData(cityId);if(!cd)return;const grid=document.getElementById("categories-grid");grid.innerHTML=cd.categories.map(cat=>{const name=cat[`name_${currentLang}`]||cat.name_ja;const bag=cat[`bag_${currentLang}`]||cat.bag_ja||"";const desc=cat[`desc_${currentLang}`]||cat.desc_en||"";const color=getCatColor(cat.id);return`<div class="cat-card" style="border-left-color:${color}"><div class="cat-name">${name}</div><div class="cat-bag" style="color:${color}">${bag}</div><div class="cat-desc">${desc}</div></div>`}).join("")}
function renderResults(results,cityId){const section=document.getElementById("result-section");const card=document.getElementById("result-card");if(!results||results.length===0){section.classList.remove("hidden");const q=document.getElementById("search-input").value;const rules=t("fallback_rules").split("|").map(r=>`<div style="padding:4px 0;font-size:13px;text-align:left">${r}</div>`).join("");card.innerHTML=`<div class="no-result">${t("no_result",{q:esc(q)})}<div style="margin-top:14px;font-weight:600;font-size:13px;text-align:left">${t("fallback_title")}</div>${rules}<div style="margin-top:10px;font-size:12px;color:var(--text-tertiary);text-align:left">${t("fallback_contact")}</div></div>`;card.dataset.lastSearch="";return}section.classList.remove("hidden");let html=`<div class="match-info">${t("match_prefix")}${results.length}${t("match_suffix")}</div>`;results.forEach((item,idx)=>{const cat=getCategory(cityId,item.cat);const catName=cat?(cat[`name_${currentLang}`]||cat.name_ja):item.cat;const bagInfo=cat?(cat[`bag_${currentLang}`]||cat.bag_ja||""):"";const color=getCatColor(item.cat);const noteKey=`note_${currentLang}`;const note=item[noteKey]||item.note_ja||"";const emoji=item.cat==="moeru"?"🔥":item.cat==="moenai"?"⛔":item.cat==="recycle"?"♻️":item.cat==="koshi"?"📰":item.cat==="sodai"?"📦":item.cat==="not_collected"?"⚠️":"🚚";html+=`<div class="result-header" style="background:${color}"><span class="emoji">${emoji}</span><div><div class="cat-title">${catName}</div><div class="bag-name">${bagInfo}</div></div></div><div class="result-body"><div class="result-item"><span class="label">${t("ja_name")}</span><span class="value">${item.name}</span></div>${note?`<div class="result-divider"></div><div class="result-item"><span class="label">${t("how_to")}</span><span class="value note">${note}</span></div>`:""}<div class="result-divider"></div><div class="result-item"><span class="label">${t("bag_type")}</span><span class="value" style="color:${color}">${bagInfo}</span></div></div>`;if(idx<results.length-1)html+=`<div style="height:8px"></div>`});card.innerHTML=html;card.dataset.lastSearch=document.getElementById("search-input").value}
function renderSuggestions(results){const el=document.getElementById("suggestions");if(!results||results.length===0){el.classList.remove("show");return}const cityId=document.getElementById("city-select").value;el.innerHTML=results.map(item=>{const cat=getCategory(cityId,item.cat);const catName=cat?(cat[`name_${currentLang}`]||cat.name_ja):"";const color=getCatColor(item.cat);return`<div class="suggestion-item" data-item="${item.name}"><span class="s-cat" style="background:${color}">${catName}</span><span class="s-name">${item[currentLang]||item.zh||item.name}</span><span class="s-ja">${item.name}</span></div>`}).join("");el.classList.add("show")}
const HISTORY_KEY="gomi_history",MAX_HISTORY=5;
function getHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY))||[]}catch{return[]}}
function addHistory(query){if(!query||!query.trim())return;const h=getHistory().filter(s=>s!==query.trim());h.unshift(query.trim());if(h.length>MAX_HISTORY)h.length=MAX_HISTORY;localStorage.setItem(HISTORY_KEY,JSON.stringify(h));renderHistory()}
function clearHistory(){localStorage.removeItem(HISTORY_KEY);renderHistory()}
function renderHistory(){const section=document.getElementById("history-section"),list=document.getElementById("history-list"),h=getHistory();if(h.length===0){section.classList.add("hidden");return}section.classList.remove("hidden");document.getElementById("history-label").textContent=t("history_label");document.getElementById("history-clear-btn").textContent=t("history_clear");list.innerHTML=h.map(s=>`<div class="history-item" data-q="${esc(s)}"><span class="h-icon">🕐</span><span class="h-text">${esc(s)}</span><button class="h-del" data-q="${esc(s)}">✕</button></div>`).join("");list.querySelectorAll(".history-item").forEach(el=>{el.addEventListener("click",function(e){if(e.target.closest(".h-del"))return;const q=this.dataset.q;document.getElementById("search-input").value=q;performSearch(q)})});list.querySelectorAll(".h-del").forEach(btn=>{btn.addEventListener("click",function(e){e.stopPropagation();const q=this.dataset.q;const h=getHistory().filter(s=>s!==q);localStorage.setItem(HISTORY_KEY,JSON.stringify(h));renderHistory()})})}
function performSearch(query){const cityId=document.getElementById("city-select").value;const results=searchItems(cityId,query);renderResults(results,cityId);addHistory(query);document.getElementById("suggestions").classList.remove("show");document.getElementById("history-section").classList.add("hidden")}

// ===== 快捷标签（多语言） =====
const QUICK_TAGS=[{item:"ペットボトル",emoji:"🥤"},{item:"空き缶",emoji:"🥫"},{item:"新聞紙",emoji:"📰"},{item:"乾電池",emoji:"🔋"},{item:"食品トレイ",emoji:"📦"}];
function renderQuickTags(){const el=document.getElementById("quick-tags");const items=getAllItems(document.getElementById("city-select").value);el.innerHTML=QUICK_TAGS.map(q=>{const found=items.find(i=>i.name===q.item);const name=found?found[currentLang]||found.zh||found.name:q.item;return`<span class="tag" data-item="${q.item}">${q.emoji} ${name}</span>`}).join("")}

// ===== Speech（长按录音，松开完成） =====
let recognition=null,isListening=false,pressing=false,micPressTimer=null;
function initSpeech(){const isMobile=/Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR&&!isMobile){document.getElementById("mic-btn").style.opacity=".35";document.getElementById("mic-btn").title=t("not_supported");return}if(isMobile){document.getElementById("mic-btn").title=t("mic_fallback");return}recognition=new SR();recognition.continuous=false;recognition.interimResults=false;recognition.maxAlternatives=3;recognition.onresult=e=>{if(pressing){const t=e.results[0][0].transcript;document.getElementById("search-input").value=t;document.getElementById("suggestions").classList.remove("show");performSearch(t)}};recognition.onerror=e=>{if(e.error!=="no-speech"&&e.error!=="aborted")console.warn("Speech:",e.error)};recognition.onend=()=>{if(pressing)pressing=false;stopVisual()}}
function micPress(e){e.preventDefault();pressing=true;document.getElementById("mic-btn").classList.add("listening");if(recognition){try{recognition.lang=currentLang==="zh"?"zh-CN":currentLang==="ja"?"ja-JP":currentLang==="ko"?"ko-KR":"en-US";recognition.start();showSpeechStatus();micPressTimer=setTimeout(()=>{if(pressing){try{recognition.stop()}catch{}micRelease()}},8000)}catch(e){micRelease()}}else{document.getElementById("search-input").focus();showMobileHint()}}
function micRelease(e){if(e)e.preventDefault();if(!pressing)return;pressing=false;if(micPressTimer){clearTimeout(micPressTimer);micPressTimer=null}stopVisual();if(recognition){try{recognition.stop()}catch{}setTimeout(hideSpeechStatus,200)}else{hideSpeechStatus()}}
function showMobileHint(){const el=document.getElementById("speech-status");el.classList.remove("hidden");document.getElementById("speech-text").innerHTML="🎤 "+t("mic_fallback");document.getElementById("speech-hint").textContent="";document.querySelector(".speech-wave")&&(document.querySelector(".speech-wave").style.display="none");setTimeout(()=>{if(!pressing){el.classList.add("hidden");document.querySelector(".speech-wave")&&(document.querySelector(".speech-wave").style.display="")}},3000)}
function stopVisual(){document.getElementById("mic-btn").classList.remove("listening")}
function showSpeechStatus(){const el=document.getElementById("speech-status");el.classList.remove("hidden");document.getElementById("speech-text").textContent=t("listening");document.getElementById("speech-hint").textContent=t("speak_hint")}
function hideSpeechStatus(){document.getElementById("speech-status").classList.add("hidden")}

// ===== App =====
document.addEventListener("DOMContentLoaded",()=>{
  const $=id=>document.getElementById(id),searchInput=$("search-input"),searchBtn=$("search-btn"),micBtn=$("mic-btn"),clearBtn=$("clear-btn"),citySelect=$("city-select");
  const i18nMap={subtitle:"subtitle","help-title":"help_title","footer-text":"footer_text","history-label":"history_label","history-clear-btn":"history_clear"};
  for(const[id,key]of Object.entries(i18nMap)){const el=document.getElementById(id);if(el)el.dataset.i18n=key}
  searchInput.placeholder=t("search_placeholder");
  document.querySelectorAll(".lang-btn").forEach(b=>b.classList.toggle("active",b.dataset.lang===currentLang));
  document.querySelectorAll("[data-i18n]").forEach(el=>{const key=el.dataset.i18n;if(key==="mic_title"||key==="search_title")el.title=t(key);else el.textContent=t(key)});
  initSpeech();renderCategories();renderQuickTags();renderHistory();
  document.querySelectorAll(".lang-btn").forEach(btn=>{btn.addEventListener("click",()=>setLang(btn.dataset.lang))});
  searchBtn.addEventListener("click",()=>{const q=searchInput.value.trim();if(q){document.getElementById("suggestions").classList.remove("show");performSearch(q)}});
  searchInput.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();const q=searchInput.value.trim();if(q){document.getElementById("suggestions").classList.remove("show");performSearch(q)}}});
  let suggestTimer=null;
  searchInput.addEventListener("input",()=>{clearTimeout(suggestTimer);const q=searchInput.value.trim();clearBtn.classList.toggle("hidden",!q);if(q.length<1){document.getElementById("suggestions").classList.remove("show");return}suggestTimer=setTimeout(()=>{renderSuggestions(getSuggestions(citySelect.value,q))},80)});
  document.getElementById("suggestions").addEventListener("click",e=>{const item=e.target.closest(".suggestion-item");if(!item)return;const val=item.dataset.item;searchInput.value=val;document.getElementById("suggestions").classList.remove("show");performSearch(val)});
  clearBtn.addEventListener("click",()=>{searchInput.value="";clearBtn.classList.add("hidden");searchInput.focus();document.getElementById("suggestions").classList.remove("show");$("result-section").classList.add("hidden");$("history-section").classList.remove("hidden");renderHistory()});
  document.addEventListener("click",e=>{if(!e.target.closest(".input-group"))document.getElementById("suggestions").classList.remove("show")});
  micBtn.addEventListener("pointerdown",micPress);
  document.addEventListener("pointerup",e=>{const btn=document.getElementById("mic-btn");if(pressing&&(!e.target.closest||!e.target.closest("#mic-btn")))micRelease(e)});
  micBtn.addEventListener("pointerleave",e=>{if(pressing)micRelease(e)});
  document.querySelectorAll(".tag").forEach(tag=>{tag.addEventListener("click",()=>{searchInput.value=tag.dataset.item;document.getElementById("suggestions").classList.remove("show");performSearch(tag.dataset.item)})});
  citySelect.addEventListener("change",()=>{renderCategories();$("result-section").classList.add("hidden");$("history-section").classList.remove("hidden");renderHistory()});
  $("history-clear-btn").addEventListener("click",clearHistory);
});
</script>
